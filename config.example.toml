# Hermes Mesh — example configuration
# Copy this to config.toml and fill in your values.
# config.toml is gitignored — it never leaves your machine.

enabled = true
machine_name = "my-machine"          # unique per machine, lowercase
hermes_home = "~/.hermes"            # where Hermes lives
role = "worker"                      # "coordinator" or "worker"
bare_repo = ""                       # coordinator only: ~/git/hermes-knowledge.git
upstream = "https://github.com/B1Z0N/hermes-mesh.git"

[scheduler]
interval_minutes = 15               # how often sync runs
