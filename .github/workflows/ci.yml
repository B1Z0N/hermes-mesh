name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: ShellCheck
        run: |
          shellcheck sync.sh setup.sh uninstall.sh update.sh test.sh || true
      - name: Run test suite
        run: bash test.sh
