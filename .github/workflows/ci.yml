name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: ShellCheck (shell)
        run: shellcheck --severity=warning sync.sh setup.sh uninstall.sh update.sh test.sh

      - name: Python syntax check
        run: python3 -m py_compile memory-merge.py

      - name: Python import smoke test
        run: python3 memory-merge.py --help

      - name: Ruff lint (Python)
        run: |
          pip install -q ruff 2>/dev/null && ruff check memory-merge.py

      - name: Run test suite
        run: bash test.sh
